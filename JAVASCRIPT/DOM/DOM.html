<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="styles.css">
    <title>Pruebas JavaScript</title>
</head>
<body>
    <div class="container">
        <div class="idioma-selector">
            <label for="idiomas">Idioma:</label>
            <select id="idiomas" onchange="cambiarIdioma(this.value)">
                <option value="es">Español</option>
                <option value="en">English</option>
                <option value="fr">Français</option>
            </select>
        </div>
        
        <h1>Pruebas JavaScript</h1>
        
        <div class="input-group">
            <input type="text" id="inputMensaje" placeholder="Escribe un mensaje...">
            <button id="tituloBoton" onclick="agregarMensaje()">Agregar Mensaje</button>
        </div>
        
        <div id="contenido">
            <!-- Aquí se mostrarán los mensajes -->
        </div>
    </div>
    
    <script src="pruebas.js"></script>
</body>
</html>
